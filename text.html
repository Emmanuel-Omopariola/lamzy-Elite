<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamzy Elite - Live Trading Chart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #121212;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-primary: #2979f0;
            --green: #22c55e;
            --red: #ef4444;
            --border: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: #1a1a1a;
            border-radius: 6px;
            font-size: 13px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chart-container {
            flex: 1;
            position: relative;
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            min-height: 500px;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .spinner {
            border: 3px solid #333;
            border-top: 3px solid var(--accent-primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            max-width: 500px;
            padding: 30px;
            background: #1a1a1a;
            border-radius: 12px;
        }

        .error i {
            font-size: 48px;
            color: var(--red);
            margin-bottom: 15px;
        }

        button {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">ETH/USDT Live Chart</div>
            <div class="status" id="status">
                <div class="status-dot"></div>
                <span id="statusText">Connecting...</span>
            </div>
        </div>
        
        <div class="chart-container" id="chartContainer">
            <canvas id="chart"></canvas>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>Loading live market data...</div>
                <div id="attempt" style="font-size: 12px; color: var(--text-secondary); margin-top: 10px;"></div>
            </div>
            
            <div class="error" id="error" style="display: none;">
                <i class="fas fa-exclamation-triangle"></i>
                <h3>Connection Failed</h3>
                <p id="errorMsg"></p>
                <button onclick="location.reload()">Retry</button>
            </div>
        </div>
    </div>

    <script>
        // =====================================================
        // WORKING LIVE DATA FETCHER - NO ABORT SIGNAL ISSUES
        // =====================================================

        const STATE = {
            candles: [],
            price: 0,
            source: '',
            colors: {
                bg: '#121212',
                border: '#2a2a2a',
                text: '#808080',
                green: '#22c55e',
                red: '#ef4444'
            }
        };

        // Simple fetch without AbortController (causes the cloning issue)
        async function simpleFetch(url, timeout = 8000) {
            return new Promise((resolve, reject) => {
                const timer = setTimeout(() => {
                    reject(new Error('Timeout'));
                }, timeout);

                fetch(url, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                })
                .then(response => {
                    clearTimeout(timer);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.json();
                })
                .then(data => resolve(data))
                .catch(error => {
                    clearTimeout(timer);
                    reject(error);
                });
            });
        }

        // Update attempt status
        function updateAttempt(msg) {
            const el = document.getElementById('attempt');
            if (el) el.textContent = msg;
            console.log('→', msg);
        }

        // Try to fetch from Binance (most reliable)
        async function fetchFromBinance() {
            updateAttempt('Trying Binance API...');
            
            const urls = [
                'https://api.binance.com/api/v3/klines?symbol=ETHUSDT&interval=5m&limit=120',
                'https://corsproxy.io/?https://api.binance.com/api/v3/klines?symbol=ETHUSDT&interval=5m&limit=120',
                'https://api.allorigins.win/get?url=https://api.binance.com/api/v3/klines?symbol=ETHUSDT&interval=5m&limit=120'
            ];

            for (const url of urls) {
                try {
                    console.log('Trying:', url);
                    let data = await simpleFetch(url, 6000);
                    
                    // Handle allorigins wrapper
                    if (data.contents) {
                        data = JSON.parse(data.contents);
                    }
                    
                    if (Array.isArray(data) && data.length > 0) {
                        return data.map(item => ({
                            time: item[0],
                            open: parseFloat(item[1]),
                            high: parseFloat(item[2]),
                            low: parseFloat(item[3]),
                            close: parseFloat(item[4]),
                            volume: parseFloat(item[5]) / 1000000
                        }));
                    }
                } catch (e) {
                    console.warn('Failed:', e.message);
                }
            }
            return null;
        }

        // Try CoinGecko (no auth needed)
        async function fetchFromCoinGecko() {
            updateAttempt('Trying CoinGecko API...');
            
            const urls = [
                'https://api.coingecko.com/api/v3/coins/ethereum/market_chart?vs_currency=usd&days=1&interval=hourly',
                'https://corsproxy.io/?https://api.coingecko.com/api/v3/coins/ethereum/market_chart?vs_currency=usd&days=1&interval=hourly'
            ];

            for (const url of urls) {
                try {
                    console.log('Trying:', url);
                    const data = await simpleFetch(url, 6000);
                    
                    if (data.prices && data.prices.length > 0) {
                        return data.prices.map(item => {
                            const price = item[1];
                            const variance = price * 0.003;
                            return {
                                time: item[0],
                                open: price - variance/2,
                                high: price + variance,
                                low: price - variance,
                                close: price + variance/2,
                                volume: 5 + Math.random() * 10
                            };
                        });
                    }
                } catch (e) {
                    console.warn('Failed:', e.message);
                }
            }
            return null;
        }

        // Fetch live data from any working source
        async function fetchLiveData() {
            const sources = [
                { name: 'Binance', fn: fetchFromBinance },
                { name: 'CoinGecko', fn: fetchFromCoinGecko }
            ];

            for (const source of sources) {
                try {
                    const candles = await source.fn();
                    if (candles && candles.length > 0) {
                        STATE.source = source.name;
                        return candles.slice(-120); // Last 120 candles
                    }
                } catch (e) {
                    console.error(`${source.name} failed:`, e);
                }
            }

            throw new Error('All APIs failed. Please check your internet connection.');
        }

        // Initialize chart with live data
        async function init() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const canvas = document.getElementById('chart');
            const status = document.getElementById('statusText');

            try {
                // Fetch data
                STATE.candles = await fetchLiveData();
                STATE.price = STATE.candles[STATE.candles.length - 1].close;

                // Hide loading
                loading.style.display = 'none';
                
                // Update status
                status.textContent = `Live • ${STATE.source}`;
                
                // Draw chart
                drawChart();
                
                console.log('✅ Success!');
                console.log(`📊 ${STATE.candles.length} candles loaded`);
                console.log(`💰 Current price: $${STATE.price.toFixed(2)}`);
                console.log(`🔌 Source: ${STATE.source}`);

                // Update every 30 seconds
                setInterval(async () => {
                    try {
                        const newCandles = await fetchLiveData();
                        if (newCandles && newCandles.length > 0) {
                            STATE.candles = newCandles;
                            STATE.price = newCandles[newCandles.length - 1].close;
                            drawChart();
                            console.log('🔄 Price updated:', STATE.price.toFixed(2));
                        }
                    } catch (e) {
                        console.warn('Update failed:', e.message);
                    }
                }, 30000);

            } catch (e) {
                console.error('❌ Fatal error:', e);
                loading.style.display = 'none';
                error.style.display = 'block';
                document.getElementById('errorMsg').textContent = e.message;
                status.textContent = 'Offline';
            }
        }

        // Draw chart
        function drawChart() {
            const canvas = document.getElementById('chart');
            if (!canvas || STATE.candles.length === 0) return;

            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);

            const W = rect.width;
            const H = rect.height;
            const PAD = { top: 20, right: 80, bottom: 40, left: 10 };
            const cW = W - PAD.left - PAD.right;
            const cH = H - PAD.top - PAD.bottom;

            // Background
            ctx.fillStyle = STATE.colors.bg;
            ctx.fillRect(0, 0, W, H);

            // Price range
            let maxP = Math.max(...STATE.candles.map(c => c.high));
            let minP = Math.min(...STATE.candles.map(c => c.low));
            const range = maxP - minP;
            maxP += range * 0.1;
            minP -= range * 0.1;
            const adjRange = maxP - minP;

            const priceToY = p => PAD.top + cH - ((p - minP) / adjRange) * cH;

            // Grid
            ctx.strokeStyle = STATE.colors.border;
            ctx.lineWidth = 1;
            for (let i = 0; i <= 6; i++) {
                const y = PAD.top + (cH / 6) * i;
                ctx.beginPath();
                ctx.moveTo(PAD.left, y);
                ctx.lineTo(W - PAD.right, y);
                ctx.stroke();

                // Price labels
                const price = maxP - (adjRange / 6) * i;
                ctx.fillStyle = STATE.colors.text;
                ctx.font = '11px monospace';
                ctx.textAlign = 'right';
                ctx.fillText(price.toFixed(2), W - PAD.right + 5, y + 4);
            }

            // Candles
            const candleW = cW / STATE.candles.length;
            STATE.candles.forEach((c, i) => {
                const x = PAD.left + i * candleW + candleW / 2;
                const isGreen = c.close >= c.open;
                const color = isGreen ? STATE.colors.green : STATE.colors.red;

                // Wick
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x, priceToY(c.high));
                ctx.lineTo(x, priceToY(c.low));
                ctx.stroke();

                // Body
                const top = priceToY(Math.max(c.open, c.close));
                const height = Math.max(Math.abs(priceToY(c.close) - priceToY(c.open)), 1);
                const width = Math.max(candleW * 0.7, 1);
                ctx.fillStyle = color;
                ctx.fillRect(x - width/2, top, width, height);
            });

            // Current price line
            const cpY = priceToY(STATE.price);
            ctx.strokeStyle = STATE.colors.red;
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(PAD.left, cpY);
            ctx.lineTo(W - PAD.right, cpY);
            ctx.stroke();
            ctx.setLineDash([]);

            // Price badge
            ctx.fillStyle = STATE.colors.red;
            ctx.fillRect(W - PAD.right + 10, cpY - 12, 65, 24);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('$' + STATE.price.toFixed(2), W - PAD.right + 42, cpY + 4);
        }

        // Resize handler
        window.addEventListener('resize', () => {
            if (STATE.candles.length > 0) drawChart();
        });

        // Start
        init();
    </script>yo 
</body>
</html>
